<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FITPAY — Join the Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --bg2: #141414;
            --bg3: #1c1c1c;
            --lime: #c8f53c;
            --lime2: #d9ff52;
            --border: #2a2a2a;
            --text: #f2f2f0;
            --text2: #888;
            --r: 4px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Barlow', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
        }

        /* NAV */
        nav {
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            background: rgba(13,13,13,0.95);
            border-bottom: 1px solid var(--border);
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        }
        .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--lime); }
        .nav-logo span { color: var(--text); }

        /* AUTH SECTION */
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 64px;
            position: relative;
            overflow: hidden;
        }
        .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size: 60px 60px; opacity: .15; }
        .bg-glow { position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, rgba(200,245,60,0.05) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .auth-card {
            position: relative; z-index: 1;
            display: grid; grid-template-columns: 1fr 1.2fr;
            max-width: 900px; width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border);
            margin: 20px;
            min-height: 580px;
        }

        /* Left Side */
        .auth-left {
            background: var(--bg3);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid var(--border);
        }
        .auth-headline { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; line-height: 0.95; letter-spacing: 2px; margin-bottom: 20px; }
        .auth-headline span { color: var(--lime); }
        .auth-desc { color: var(--text2); font-size: 0.9rem; line-height: 1.6; margin-bottom: 30px; }

        /* Right Side */
        .auth-right { padding: 60px 50px; display: flex; flex-direction: column; justify-content: center; }
        .auth-right h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .auth-hint { color: var(--text2); font-size: 0.85rem; margin-bottom: 25px; }

        /* ROLE SELECTOR */
        .role-label { display: block; font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text2); margin-bottom: 10px; }
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
            background: var(--bg3);
            padding: 5px;
            border-radius: var(--r);
            border: 1px solid var(--border);
        }
        .role-btn {
            border: none;
            background: none;
            color: var(--text2);
            padding: 10px;
            font-family: 'Barlow', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 2px;
        }
        .role-btn.active {
            background: var(--lime);
            color: #0d0d0d;
        }

        .field { margin-bottom: 18px; }
        .field label { display: block; font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; }
        .field input {
            width: 100%; background: var(--bg3); border: 1px solid var(--border);
            color: var(--text); font-family: 'Barlow', sans-serif; padding: 12px 15px;
            border-radius: var(--r); outline: none; transition: 0.2s;
        }
        .field input:focus { border-color: var(--lime); }

        .btn-auth {
            width: 100%; background: var(--lime); color: #0d0d0d; border: none;
            padding: 14px; font-weight: 800; font-family: 'Barlow', sans-serif;
            text-transform: uppercase; letter-spacing: 2px; border-radius: var(--r);
            cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn-auth:hover { background: var(--lime2); transform: translateY(-1px); }

        .toggle-link {
            text-align: center; margin-top: 25px; font-size: 0.85rem; color: var(--text2);
        }
        .toggle-link a { color: var(--lime); text-decoration: none; font-weight: 700; margin-left: 5px; }
        .toggle-link a:hover { text-decoration: underline; }

        .reg-only { display: none; }

        @media (max-width: 768px) {
            .auth-card { grid-template-columns: 1fr; }
            .auth-left { display: none; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">FITNESS</div>
</nav>

<div class="auth-container">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="auth-card">
        <div class="auth-left">
            <div class="auth-headline" id="sideHeadline">JOIN THE<br><span>ELITE</span><br>COMMUNITY</div>
            <p class="auth-desc" id="sideDesc">Access premium facilities and manage your health with our professional ecosystem.</p>
            <div style="font-size: 0.75rem; font-weight: 700; color: var(--lime);">● SYSTEM ONLINE</div>
        </div>

        <div class="auth-right">
            <h2 id="formTitle">Sign In</h2>
            <p class="auth-hint" id="formHint">Welcome back! Please enter your details.</p>

            <span class="role-label">Identity</span>
            <div class="role-selector">
                <button class="role-btn active" onclick="setRole('member')" id="roleMember">Member</button>
                <button class="role-btn" onclick="setRole('admin')" id="roleAdmin">Admin / Staff</button>
            </div>

            <div class="field reg-only">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Your Name">
            </div>

            <div class="field">
                <label>Email Address</label>
                <input type="email" id="authEmail" placeholder="name@example.com">
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" id="authPass" placeholder="••••••••">
            </div>

            <button class="btn-auth" id="authBtn" onclick="submitAuth()">Sign In →</button>

            <div class="toggle-link">
                <span id="toggleText">Don't have an account?</span>
                <a href="javascript:void(0)" onclick="toggleMode()" id="toggleLink">Sign Up</a>
            </div>
        </div>
    </div>
</div>

<script>
    // ตรวจสอบ Token เมื่อโหลดหน้า
    window.onload = function() {
    if (localStorage.getItem('token')) {
        // ใช้ /home (ตัวเล็ก) ตามที่ตั้งไว้ใน server.js
        window.location.href = '/home'; 
    }
}

    let isLogin = true;
    let selectedRole = 'member'; // Default เป็น member

    // ฟังก์ชันเปลี่ยน Role
    function setRole(role) {
        selectedRole = role;
        document.getElementById('roleMember').classList.toggle('active', role === 'member');
        document.getElementById('roleAdmin').classList.toggle('active', role === 'admin');
    }

    function toggleMode() {
        isLogin = !isLogin;
        
        document.getElementById('formTitle').textContent = isLogin ? 'Sign In' : 'Create Account';
        document.getElementById('formHint').textContent = isLogin ? 'Welcome back! Please enter your details.' : 'Start your journey with us today.';
        document.getElementById('authBtn').textContent = isLogin ? 'Sign In →' : 'Register Now →';
        document.getElementById('toggleText').textContent = isLogin ? "Don't have an account?" : "Already have an account?";
        document.getElementById('toggleLink').textContent = isLogin ? "Sign Up" : "Sign In";

        document.getElementById('sideHeadline').innerHTML = isLogin ? 'BACK TO<br><span>GRIND</span><br>AGAIN' : 'JOIN THE<br><span>ELITE</span><br>COMMUNITY';

        const regFields = document.querySelectorAll('.reg-only');
        regFields.forEach(el => el.style.display = isLogin ? 'none' : 'block');
    }

    const API = 'http://localhost:8080/api';

    async function submitAuth() {
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPass').value.trim();
        const full_name = document.getElementById('regName').value.trim();
        const btn = document.getElementById('authBtn');

        if (!email || !password || (!isLogin && !full_name)) {
            alert("Please fill in all required fields.");
            return;
        }

        btn.disabled = true;
        btn.textContent = isLogin ? "SIGNING IN..." : "CREATING ACCOUNT...";

        const endpoint = isLogin ? '/auth/login' : '/auth/register';

        try {
            const response = await fetch(`${API}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // ✅ ส่ง role ไปที่ Backend ด้วย
                body: JSON.stringify({ email, password, full_name, role: selectedRole })
            });

            const result = await response.json();

            if (response.ok) {
    if (isLogin) {
        localStorage.setItem('token', result.token);
        localStorage.setItem('user', JSON.stringify({
            id: result.userId,
            memberId: result.memberId,
            name: result.full_name,
            role: result.role
        }));

        alert(`Login Successful! Welcome, ${result.role}.`);
        
        if (result.role === 'admin') {
            // ใส่ / นำหน้าเพื่อให้ Server หา Route เจอ
            window.location.href = '/admin-select'; 
        } else {
            // ใส่ / home ตาม Route หลัก
            window.location.href = '/home';  
        }

                } else {
                    alert("Registration Successful! Now you can Sign In.");
                    toggleMode();
                }
            } else {
                alert(result.message || result.error || "Authentication failed.");
            }
        } catch (error) {
            alert("Cannot connect to server. Please check if your Backend is running.");
        } finally {
            btn.disabled = false;
            btn.textContent = isLogin ? 'Sign In →' : 'Register Now →';
        }
    }
</script>

</body>
</html>
